# Definicije ruta i parametara prikupljanja.
#
# Svaka ruta je UREĐENI niz točaka: origin, međutočke..., destination.
# Dionice (legs) nastaju IZMEĐU susjednih točaka.
# Koordinate su ručno izvučene iz Google Maps na trasi A1.

timezone: Europe/Zagreb

# BEST_GUESS (default) | PESSIMISTIC | OPTIMISTIC
# Napomena: trafficModel se šalje API-ju SAMO uz TRAFFIC_AWARE_OPTIMAL.
traffic_model: BEST_GUESS

# TRAFFIC_AWARE (Pro tier, besplatno do 5000/mj) | TRAFFIC_AWARE_OPTIMAL (skuplje)
routing_preference: TRAFFIC_AWARE

# true = mjeri samo CIJELU rutu (origin->destination, bez međutočaka): pouzdano,
#        bez obilazaka. false = v2: koristi međutočke za razdiobu po dionicama.
whole_route_only: true

routes:
  - name: "Šibenik → Zagreb"
    active: true
    points:
      - { label: "Šibenik", lat: 43.768607, lng: 15.931692 }
      - { label: "Zagreb",  lat: 45.794907, lng: 15.944004 }   # Trešnjevka

  - name: "Zagreb → Šibenik"
    active: true
    points:
      - { label: "Zagreb",  lat: 45.794907, lng: 15.944004 }   # Trešnjevka
      - { label: "Šibenik", lat: 43.768607, lng: 15.931692 }
