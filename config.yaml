# Definicije ruta i parametara prikupljanja.
#
# Svaka ruta je UREĐENI niz točaka: origin, međutočke..., destination.
# Dionice (legs) nastaju IZMEĐU susjednih točaka.
# Koordinate su ručno izvučene iz Google Maps na trasi A1.

timezone: Europe/Zagreb

# BEST_GUESS (default) | PESSIMISTIC | OPTIMISTIC
# Napomena: trafficModel se šalje API-ju SAMO uz TRAFFIC_AWARE_OPTIMAL.
traffic_model: BEST_GUESS

# TRAFFIC_AWARE (Pro tier, besplatno do 5000/mj) | TRAFFIC_AWARE_OPTIMAL (skuplje)
routing_preference: TRAFFIC_AWARE

# true = mjeri samo CIJELU rutu (origin->destination, bez međutočaka): pouzdano,
#        bez obilazaka. false = v2: koristi međutočke za razdiobu po dionicama.
whole_route_only: true

routes:
  # ── v1: CIJELA RUTA (adrese) — skuplja dalje, ne diramo ─────────────────────
  - name: "Šibenik → Zagreb"
    active: true
    whole_route_only: true
    points:
      - { label: "Šibenik", address: "Šibenik, Hrvatska" }
      - { label: "Zagreb",  address: "Trešnjevka, Zagreb, Hrvatska" }

  - name: "Zagreb → Šibenik"
    active: true
    whole_route_only: true
    points:
      - { label: "Zagreb",  address: "Trešnjevka, Zagreb, Hrvatska" }
      - { label: "Šibenik", address: "Šibenik, Hrvatska" }

  # ── v2 dionice (Šibenik → Zagreb) — TEST: Lučko na traci prema Zagrebu ───────
  # Ostale točke su još Place ID-evi (rampe) i radit će obilaske; gledamo SAMO
  # mijenja li Lučko koordinata dionicu Lučko->Zagreb s ~36 km na ~7-8 km.
  - name: "Šibenik → Zagreb (dionice)"
    active: true
    whole_route_only: false
    points:
      - { label: "Šibenik",   place_id: "ChIJRTCczq8vNRMRUZiAaPFigR8" }
      - { label: "Zadar",     place_id: "ChIJU21P2YzoYUcRXrgZ-f04gIE" }
      - { label: "Sveti Rok", place_id: "ChIJ9-toXOC-YUcRKHIuAQF_m1w" }
      - { label: "Gospić",    place_id: "ChIJe73jfj5_YUcRCFrgeqXNlgI" }
      - { label: "Otočac",    place_id: "ChIJ4RSvLAzqY0cRWl0XGzyGCyo" }
      - { label: "Bosiljevo", lat: 45.408917, lng: 15.270444 }   # TRAKA prema Zagrebu
      - { label: "Karlovac",  lat: 45.515972, lng: 15.552056 }   # TRAKA prema Zagrebu
      - { label: "Lučko",     lat: 45.749972, lng: 15.885361 }   # TRAKA prema Zagrebu
      - { label: "Zagreb",    place_id: "ChIJOwVxSqrVZUcREOmyVeVIGF0" }

  # ── v2 obrnuti smjer — UGAŠEN dok ne posložimo točke ────────────────────────
  - name: "Zagreb → Šibenik (dionice)"
    active: false
    whole_route_only: false
    points:
      - { label: "Zagreb",    place_id: "ChIJOwVxSqrVZUcREOmyVeVIGF0" }
      - { label: "Lučko",     lat: 45.748389, lng: 15.883472 }   # TRAKA prema Šibeniku
      - { label: "Karlovac",  place_id: "ChIJO0-vWqc-ZEcRo_lMGPhQBhY" }
      - { label: "Bosiljevo", place_id: "ChIJf7XlIQBvZEcR-suxe_X4IRE" }
      - { label: "Otočac",    place_id: "ChIJ4RSvLAzqY0cRWl0XGzyGCyo" }
      - { label: "Gospić",    place_id: "ChIJe73jfj5_YUcRCFrgeqXNlgI" }
      - { label: "Sveti Rok", place_id: "ChIJ9-toXOC-YUcRKHIuAQF_m1w" }
      - { label: "Zadar",     place_id: "ChIJU21P2YzoYUcRXrgZ-f04gIE" }
      - { label: "Šibenik",   place_id: "ChIJRTCczq8vNRMRUZiAaPFigR8" }
